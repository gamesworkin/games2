<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroCloud - Indie Gaming</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDKs (Versão estável v9 compatível com CDN) -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"
            }
        }
    </script>
</head>
<body>

    <!-- Header / Navbar -->
    <header class="navbar">
        <div class="logo">RETRO<span>CLOUD</span></div>
        <nav class="nav-links">
            <a href="https://link-home-1.com" target="_blank" class="btn-home">Portal Geek</a>
            <a href="https://link-home-2.com" target="_blank" class="btn-home">Dev Website</a>
            <button id="btn-login" class="btn-auth">Entrar com Google</button>
            <div id="user-info" class="user-profile hidden">
                <img id="user-avatar" src="" alt="Avatar">
                <span id="user-name"></span>
                <button id="btn-logout" class="btn-sm">Sair</button>
            </div>
        </nav>
    </header>

    <!-- Área Principal do Emulador (Aparece ao clicar em um jogo) -->
    <main class="emulator-container hidden" id="emulator-screen">
        <div class="emulator-header">
            <h2 id="playing-title">Jogando...</h2>
            <button onclick="closeEmulator()" class="btn-close">✖ Fechar Jogo</button>
        </div>
        <div class="emulator-frame-wrapper">
            <!-- O EmulatorJS vai injetar o player aqui dentro -->
            <div id="emulator-player"></div>
        </div>
    </main>

    <!-- Galeria de Jogos -->
    <main class="catalog-container" id="catalog-screen">
        <div class="section-title">
            <h2>🛸 ROMs Independentes</h2>
            <p>Clique em qualquer título para carregar instantaneamente na memória RAM</p>
        </div>

        <div class="grid-games">
            <!-- Card Jogo 1 (GBA) -->
            <div class="game-card" onclick="launchGame('GBA', 'https://raw.githubusercontent.com/seu-usuario/seu-repositorio/main/roms/indie_game.gba', 'Vortex Advance')">
                <div class="badge-system">GBA</div>
                <div class="cover-wrapper">
                    <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=400" alt="Capa">
                </div>
                <div class="game-info">
                    <h3>Vortex Advance</h3>
                    <p>Desenvolvedor Indie A</p>
                </div>
            </div>

            <!-- Card Jogo 2 (SNES) -->
            <div class="game-card" onclick="launchGame('SNES', 'https://raw.githubusercontent.com/seu-usuario/seu-repositorio/main/roms/homebrew_hero.sfc', 'Homebrew Hero')">
                <div class="badge-system">SNES</div>
                <div class="cover-wrapper">
                    <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400" alt="Capa">
                </div>
                <div class="game-info">
                    <h3>Homebrew Hero</h3>
                    <p>Studio Retro 2026</p>
                </div>
            </div>

            <!-- Card Jogo 3 (Mega Drive) -->
            <div class="game-card" onclick="launchGame('MEGADRIVE', 'https://raw.githubusercontent.com/seu-usuario/seu-repositorio/main/roms/cyber_space.md', 'Cyber Space 95')">
                <div class="badge-system">MEGA DRIVE</div>
                <div class="cover-wrapper">
                    <img src="https://images.unsplash.com/photo-1578632767115-351597cf2477?w=400" alt="Capa">
                </div>
                <div class="game-info">
                    <h3>Cyber Space 95</h3>
                    <p>Neon Team</p>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
